version: '3.8'

services:
  db:
    image: postgres:15
    container_name: db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo:
    image: odoo:17.0
    container_name: assetflow-odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - .:/mnt/extra-addons
    command: -d assetflow -u assetflow --dev=all

volumes:
  odoo-db-data:
